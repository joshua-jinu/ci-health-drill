name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'    # Fixed: Node 20 LTS (Node 16 was EOL)
          cache: 'npm'
      - run: npm ci             # Fixed: npm ci for reproducible installs

  test:
    runs-on: ubuntu-latest
    needs: install             # Fixed: run after install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci             # Fixed: install deps before running tests
      - run: npm test
